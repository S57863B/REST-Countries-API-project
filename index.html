<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Countries API</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
    <div class="container header-content">
      <h1>Where in the world?</h1>
      <!-- Theme Toggle Button -->
      <button id="theme-toggle" class="theme-toggle">
        <span id="theme-icon">🌙</span> Dark Mode
      </button>
    </div>
  </header>

  <!-- Main Content Section -->
  <main id="app-root" class="container">
    <section class="controls" id="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search for a country...">
      </div>
      <!-- Region Filter Dropdown -->
      <div class="filter-box">
        <select id="region-filter">
          <option value="all">Filter by Region</option>
          <option value="Africa">Africa</option>
          <option value="Americas">Americas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
        </select>
      </div>
    </section>
    
    <!-- Countries Grid Section -->
    <section id="countries-grid" class="countries-grid"></section>

    <section id="country-detail" class="country-detail hidden"></section>
  </main>
  <script type="module" src="./src/app.js" defer></script>
</body>
</html>
